<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentFlow — Talent Coordination Platform</title>
  <meta name="description" content="Premium talent coordination and candidate tracking platform for modern teams." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Critical loading screen styles — inlined to avoid FOUC */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f;
    }
    .loader-logo {
      width: 80px; height: 80px; position: relative;
      margin-bottom: 40px;
    }
    .loader-ring {
      position: absolute; inset: 0;
      border: 2px solid transparent;
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    .loader-ring:nth-child(2) {
      inset: 8px;
      border-top-color: #e2c992;
      animation-delay: -0.15s;
    }
    .loader-ring:nth-child(3) {
      inset: 16px;
      border-top-color: rgba(201,169,110,0.4);
      animation-delay: -0.3s;
    }
    .loader-dot {
      position: absolute; top: 50%; left: 50%;
      width: 8px; height: 8px;
      background: #c9a96e;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(201,169,110,0.6);
    }
    .loader-text {
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 500;
      letter-spacing: 6px; text-transform: uppercase;
      color: rgba(201,169,110,0.7);
      animation: pulse 2s ease-in-out infinite;
    }
    .loader-bar {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px; margin-top: 24px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c9a96e, #e2c992);
      border-radius: 2px;
      animation: load-bar 2s ease-in-out forwards;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes load-bar {
      0% { width: 0%; }
      40% { width: 60%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-logo">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="loader-text">TalentFlow</div>
    <div class="loader-bar">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <!-- App Root -->
  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
